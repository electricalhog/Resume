name: Build CV

on:
  push:
    paths:
      - 'cv.tex'
      - '*.bib'
      - 'Photos/**'
      - 'Makefile'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile cv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv
          path: cv.pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if git diff --cached --quiet; then
            echo "cv.pdf unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "Rebuild cv.pdf [skip ci]"
          # The branch can move while the build runs (another push or a
          # racing workflow run), so rebase onto the latest tip and retry.
          for attempt in 1 2 3 4; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi
            echo "Push rejected, rebasing onto latest $GITHUB_REF_NAME (attempt $attempt)"
            git fetch origin "$GITHUB_REF_NAME"
            git rebase -X theirs "origin/$GITHUB_REF_NAME"
          done
          echo "Failed to push cv.pdf after 4 attempts" >&2
          exit 1
